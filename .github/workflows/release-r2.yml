name: Release APK to Cloudflare R2
run-name: Release ${{ inputs.version_name }} to R2 by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: Version name, for example 1.1.0
        required: true
        type: string
      version_code:
        description: Increasing Android version code
        required: true
        type: string
      release_notes:
        description: Chinese release notes shown in caregiver mode
        required: true
        type: string
      confirm_release:
        description: Confirm this is a production release
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: production-r2-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: production
      url: https://app.xmoyi.com/nainaisv/stable/update.json
    env:
      RELEASE_VERSION_NAME: ${{ inputs.version_name }}
      RELEASE_VERSION_CODE: ${{ inputs.version_code }}
      RELEASE_NOTES: ${{ inputs.release_notes }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Validate release request and configuration
        env:
          CONFIRM_RELEASE: ${{ inputs.confirm_release }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          ANDROID_SIGNING_CERT_SHA256: ${{ vars.ANDROID_SIGNING_CERT_SHA256 }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "Production releases must run from main, got $GITHUB_REF" >&2
            exit 1
          fi
          if [[ "$CONFIRM_RELEASE" != "true" ]]; then
            echo "confirm_release must be checked" >&2
            exit 1
          fi
          scripts/publish-r2.sh --validate \
            "$RELEASE_VERSION_NAME" \
            "$RELEASE_VERSION_CODE" \
            "$RELEASE_NOTES"
          required_values=(
            ANDROID_KEYSTORE_BASE64
            SIGNING_STORE_PASSWORD
            SIGNING_KEY_ALIAS
            SIGNING_KEY_PASSWORD
            ANDROID_SIGNING_CERT_SHA256
            CLOUDFLARE_ACCOUNT_ID
            R2_ACCESS_KEY_ID
            R2_SECRET_ACCESS_KEY
            R2_BUCKET_NAME
          )
          for name in "${required_values[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing production secret or variable: $name" >&2
              exit 1
            fi
          done
          normalized_fingerprint="$(printf '%s' "$ANDROID_SIGNING_CERT_SHA256" | tr -d '[:space:]:' | tr '[:upper:]' '[:lower:]')"
          if [[ ! "$normalized_fingerprint" =~ ^[0-9a-f]{64}$ ]]; then
            echo "ANDROID_SIGNING_CERT_SHA256 must be a SHA-256 certificate fingerprint" >&2
            exit 1
          fi
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Run unit tests
        run: ./gradlew testDebugUnitTest
      - name: Run lint and build debug APK
        run: ./gradlew lintDebug assembleDebug
      - name: Restore Android signing key
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          umask 077
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/nainaisv-release.jks"
          if [[ ! -s "$RUNNER_TEMP/nainaisv-release.jks" ]]; then
            echo "Decoded Android keystore is empty" >&2
            exit 1
          fi
          echo "SIGNING_STORE_FILE=$RUNNER_TEMP/nainaisv-release.jks" >> "$GITHUB_ENV"
      - name: Build signed release APK
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            "-PVERSION_NAME=$RELEASE_VERSION_NAME" \
            "-PVERSION_CODE=$RELEASE_VERSION_CODE"
      - name: Verify APK signature and signing identity
        env:
          ANDROID_SIGNING_CERT_SHA256: ${{ vars.ANDROID_SIGNING_CERT_SHA256 }}
        run: |
          apk_path="app/build/outputs/apk/release/app-release.apk"
          apksigner_path="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          if [[ -z "$apksigner_path" ]]; then
            echo "apksigner was not found under ANDROID_HOME" >&2
            exit 1
          fi
          "$apksigner_path" verify --verbose --print-certs "$apk_path" | tee "$RUNNER_TEMP/apksigner.txt"
          actual_fingerprint="$(sed -n 's/^Signer #1 certificate SHA-256 digest: //p' "$RUNNER_TEMP/apksigner.txt" | head -n 1 | tr -d '[:space:]:' | tr '[:upper:]' '[:lower:]')"
          expected_fingerprint="$(printf '%s' "$ANDROID_SIGNING_CERT_SHA256" | tr -d '[:space:]:' | tr '[:upper:]' '[:lower:]')"
          if [[ "$actual_fingerprint" != "$expected_fingerprint" ]]; then
            echo "Signing certificate mismatch" >&2
            echo "Expected: $expected_fingerprint" >&2
            echo "Actual:   $actual_fingerprint" >&2
            exit 1
          fi
      - name: Publish immutable APK then update manifest
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          PUBLIC_BASE_URL: https://app.xmoyi.com
        run: |
          scripts/publish-r2.sh \
            app/build/outputs/apk/release/app-release.apk \
            "$RELEASE_VERSION_NAME" \
            "$RELEASE_VERSION_CODE" \
            "$RELEASE_NOTES"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nainaisv-${{ inputs.version_name }}
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 14
