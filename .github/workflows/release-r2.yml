name: Release APK to Cloudflare R2

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: Version name, for example 1.1.0
        required: true
      version_code:
        description: Increasing Android version code
        required: true
      release_notes:
        description: Chinese release notes shown in caregiver mode
        required: true

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Install release tools
        run: sudo apt-get update && sudo apt-get install -y awscli jq
      - name: Restore Android signing key
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/nainaisv-release.jks"
          echo "SIGNING_STORE_FILE=$RUNNER_TEMP/nainaisv-release.jks" >> "$GITHUB_ENV"
      - name: Test and build signed APK
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: >-
          ./gradlew testDebugUnitTest assembleRelease
          -PVERSION_NAME=${{ inputs.version_name }}
          -PVERSION_CODE=${{ inputs.version_code }}
      - name: Publish immutable APK then update manifest
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          PUBLIC_BASE_URL: https://app.xmoyi.com
          RELEASE_VERSION_NAME: ${{ inputs.version_name }}
          RELEASE_VERSION_CODE: ${{ inputs.version_code }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          scripts/publish-r2.sh \
            app/build/outputs/apk/release/app-release.apk \
            "$RELEASE_VERSION_NAME" \
            "$RELEASE_VERSION_CODE" \
            "$RELEASE_NOTES"
      - uses: actions/upload-artifact@v4
        with:
          name: nainaisv-${{ inputs.version_name }}
          path: app/build/outputs/apk/release/app-release.apk
